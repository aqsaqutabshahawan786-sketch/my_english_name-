<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Coach App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f8fafc; color: #1e293b; user-select: none; -webkit-user-select: none; }
        .hidden { display: none !important; }
        .app-container { min-height: 100vh; display: flex; flex-direction: column; max-width: 450px; margin: 0 auto; background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        
        /* 🚨 Test Banner Styling */
        .test-banner { background-color: #f59e0b; color: #ffffff; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; }
        
        .app-header { background-color: #4f46e5; color: #ffffff; padding: 16px; text-align: center; font-weight: bold; font-size: 20px; }
        .session-header { background-color: #ffffff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-b: 1px solid #e2e8f0; }
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-label { font-size: 14px; font-weight: 600; color: #475569; }
        .textarea-field { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 14px; resize: none; outline: none; }
        
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; border-radius: 16px; border: 2px solid #e2e8f0; background-color: #ffffff; cursor: pointer; outline: none; }
        .card-btn:active { background-color: #f1f5f9; transform: scale(0.96); }
        
        .express { border-color: #e0e7ff; background-color: #f5f3ff; } .express .tag { color: #4f46e5; }
        .power { border-color: #d1fae5; background-color: #ecfdf5; } .power .tag { color: #059669; }
        .deep { border-color: #fef3c7; background-color: #fffbec; } .deep .tag { color: #d97706; }
        .mastery { border-color: #ffe4e6; background-color: #fff5f5; } .mastery .tag { color: #e11d48; }
        
        .tag { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; pointer-events: none; }
        .time { font-size: 24px; font-weight: 900; color: #1e293b; margin-bottom: 6px; pointer-events: none; }
        .price { font-size: 14px; font-weight: 600; color: #64748b; background-color: #ffffff; padding: 2px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; pointer-events: none; }
        
        .leave-btn { border: none; background: none; font-size: 14px; font-weight: 500; color: #64748b; cursor: pointer; }
        .timer-badge { font-family: monospace; font-size: 20px; font-weight: 900; color: #4f46e5; background-color: #eef2ff; padding: 4px 16px; border-radius: 9999px; border: 1px solid #e0e7ff; }
        .pause-control-btn { background-color: #4f46e5; color: #ffffff; border: none; font-weight: bold; font-size: 12px; padding: 6px 16px; border-radius: 8px; cursor: pointer; }
        
        .chat-area { flex: 1; padding: 16px; background-color: #f1f5f9; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .scenario-tag-container { text-align: center; }
        .scenario-tag { display: inline-block; background-color: #e2e8f0; color: #475569; font-size: 12px; padding: 4px 12px; border-radius: 6px; }
        
        .chat-row { display: flex; width: 100%; }
        .user-row { justify-content: flex-end; }
        .ai-row { justify-content: flex-start; }
        .bubble { max-width: 80%; padding: 10px 16px; font-size: 14px; line-height: 1.4; word-break: break-word; border-radius: 16px; }
        .user-bubble { background-color: #4f46e5; color: #ffffff; border-radius: 16px 16px 0 16px; }
        .ai-bubble { background-color: #ffffff; color: #1e293b; border: 1px solid #e2e8f0; border-radius: 16px 16px 16px 0; }
        
        .chat-footer { background-color: #ffffff; padding: 12px; border-top: 1px solid #e2e8f0; display: flex; items-center: center; gap: 8px; }
        .mic-control { background-color: #f0fdf4; color: #16a34a; border: 1px solid #d1fae5; font-size: 20px; padding: 10px; border-radius: 12px; cursor: pointer; }
        .text-input { flex: 1; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; font-size: 14px; outline: none; }
        .send-control { background-color: #4f46e5; color: #ffffff; border: none; padding: 10px 14px; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- =================================================== -->
    <!-- DAY 1: DASHBOARD UI LAYOUT                          -->
    <!-- =================================================== -->
    <div id="dashboard-screen" class="app-container">
        <!-- 🚨 Yeh banner sirf check karne ke liye hai ke naya code aaya ya nahi -->
        <div class="test-banner">👉 AGAR YEH BANNER DIKH RAHA HAI TO CODE NAYA HAI 👈</div>
        
        <header class="app-header">🗣️ English Coach</header>
        <main class="main-content">
            <div class="input-group">
                <label class="input-label">Apna Coaching Scenario Likhein:</label>
                <textarea id="scenario-input" rows="3" class="textarea-field" placeholder="Example: Job interview practice..."></textarea>
            </div>
            <div class="input-group">
                <label class="input-label">Session ki Duration Select Karein:</label>
                <div class="grid-layout">
                    <!-- Bilkul simple click system bina kisi jhanjhat ke -->
                    <button type="button" onclick="startSession(15)" class="card-btn express">
                        <span class="tag">Express</span>
                        <span class="time">15 min</span>
                        <span class="price">$5</span>
                    </button>
                    <button type="button" onclick="startSession(30)" class="card-btn power">
                        <span class="tag">Power</span>
                        <span class="time">30 min</span>
                        <span class="price">$10</span>
                    </button>
                    <button type="button" onclick="startSession(45)" class="card-btn deep">
                        <span class="tag">Deep Dive</span>
                        <span class="time">45 min</span>
                        <span class="price">$15</span>
                    </button>
                    <button type="button" onclick="startSession(60)" class="card-btn mastery">
                        <span class="tag">Mastery</span>
                        <span class="time">1 hour</span>
                        <span class="price">$20</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- =================================================== -->
    <!-- DAY 2 & 3: COACHING SESSION SCREEN & CHAT ENGINE    -->
    <!-- =================================================== -->
    <div id="coaching-screen" class="app-container hidden">
        <header class="session-header">
            <button onclick="exitSession()" class="leave-btn">❌ Leave</button>
            <div id="timer-display" class="timer-badge">00:00</div>
            <button id="pause-btn" onclick="toggleTimer()" class="pause-control-btn">⏸️ Pause</button>
        </header>

        <div id="chat-window" class="chat-area">
            <div class="scenario-tag-container">
                <span id="system-scenario-tag" class="scenario-tag"></span>
            </div>
        </div>

        <footer class="chat-footer">
            <button id="mic-btn" onclick="startSpeechRecognition()" class="mic-control">🎙️</button>
            <input type="text" id="chat-input" class="text-input" placeholder="Type here...">
            <button id="send-btn" onclick="handleTextSubmit()" class="send-control">➔</button>
        </footer>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6L5leGn4s67K4abTrsZ8rRQTINZaXME5qOo7ODF9VFipg";
        let countdownTimer = null;
        let totalSecondsRemaining = 0;
        let conversationHistory = [];

        function startSession(minutes) {
            // Screen switch karne ka sab se direct tareeqa
            document.getElementById('dashboard-screen').style.setProperty('display', 'none', 'important');
            document.getElementById('coaching-screen').classList.remove('hidden');
            
            totalSecondsRemaining = minutes * 60;
            updateTimerDisplay();
            
            clearInterval(countdownTimer);
            countdownTimer = setInterval(processTimerTick, 1000);
            
            triggerAiResponseSimulation("Hello! I am your AI English Coach. Let's start.");
        }

        function exitSession() {
            location.reload(); // Sab kuch clear karke app restart karne ke liye
        }

        function processTimerTick() {
            if (totalSecondsRemaining <= 0) {
                clearInterval(countdownTimer);
                exitSession();
                return;
            }
            totalSecondsRemaining--;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const mins = Math.floor(totalSecondsRemaining / 60).toString().padStart(2, '0');
            const secs = (totalSecondsRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${mins}:${secs}`;
        }
