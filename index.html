<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Coach AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
}

.container{
max-width:450px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
background:white;
}

header{
background:#4f46e5;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.main{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

label{
font-weight:bold;
font-size:14px;
}

input,textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

textarea{
height:90px;
resize:none;
}

.btn{
width:100%;
padding:15px;
background:#4f46e5;
color:white;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.btn:active{
transform:scale(.97);
}

.hidden{
display:none;
}

#chatScreen{
display:none;
flex-direction:column;
height:100vh;
width:100%;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#4f46e5;
color:white;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
background:#eef2ff;
}

.message{
padding:10px 15px;
border-radius:15px;
margin-bottom:10px;
max-width:80%;
}

.user{
background:#4f46e5;
color:white;
margin-left:auto;
}

.ai{
background:white;
border:1px solid #ddd;
}

.bottom{
display:flex;
padding:10px;
gap:10px;
background:white;
}

.bottom input{
flex:1;
}

.sendBtn{
padding:10px 18px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container" id="homeScreen">

<header>
English Coach AI
</header>

<div class="main">

<label>Gemini API Key</label>

<input
id="apiKey"
placeholder="Paste API Key">

<label>Scenario</label>

<textarea
id="scenario"
placeholder="Example: Job Interview"></textarea>

<button
class="btn"
onclick="startSession()">

Start Practice

</button>

</div>

</div>

<div id="chatScreen">

<div class="topBar">

<div id="timer">
15:00
</div>

<button onclick="goHome()">

Exit

</button>

</div>

<div id="chat">

</div>

<div class="bottom">

<input
id="message"
placeholder="Type here...">

<button
class="sendBtn"
onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>
    let timeLeft = 15 * 60;
let timer;

function startSession() {

const api = document.getElementById("apiKey").value.trim();

if(api===""){
alert("Please paste your Gemini API Key.");
return;
document.getElementById("homeScreen").classList.add("hidden");
document.getElementById("chatScreen").style.display="flex";

addMessage("AI","👋 Hello! I'm your English Coach. Let's practice English together.");

startTimer();

}

function startTimer(){

clearInterval(timer);

timer=setInterval(function(){

timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

if(timeLeft<=0){
clearInterval(timer);
alert("Session Finished");
goHome();
}

},1000);

}

function goHome(){

clearInterval(timer);

timeLeft=15*60;

document.getElementById("timer").innerHTML="15:00";

document.getElementById("chat").innerHTML="";

document.getElementById("homeScreen").style.display="flex";

document.getElementById("chatScreen").style.display="none";

}

function addMessage(sender,text){

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className="message "+(sender==="You"?"user":"ai");

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function sendMessage(){

const input=document.getElementById("message");

const msg=input.value.trim();

if(msg==="") return;

addMessage("You",msg);

input.value="";

addMessage("AI","⏳ Thinking... (Gemini API will be added in Part 2)");

}
</script>
</body>
</html>
