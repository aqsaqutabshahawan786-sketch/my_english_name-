}

button:hover{

}

}

#chatScreen{
display:none;
padding:20px;
}
<style>

button:hover{
opacity:.9;
}
.chatHeader{
background:#4f46e5;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
font-size:20px;
font-weight:bold;
}

<input
id="userInput"
type="text"
placeholder="Type your English..."

flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;">

<button
onclick="sendMessage()"
style="
padding:12px 18px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-weight:bold;">

Send

</button>

</div>
.backBtn{
margin-top:20px;
width:100%;
}


  #chatBox{
margin-top:20px;
height:350px;
background:white;
border:1px solid #ddd;
border-radius:12px;
padding:15px;
overflow-y:auto;
}
<div id="chatBox">
<div style="display:flex;gap:10px;margin-top:15px;">

<input
id="userInput"
type="text"
placeholder="Type your English..."
style="
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;">

<button
onclick="sendMessage()"
style="
padding:12px 18px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-weight:bold;">

Send

</button>

</div>
<div class="aiMessage">
👋 Hello! I'm your English Coach.
</div>

</div>

<!-- YAHAN PASTE KARO -->

<div style="display:flex;gap:10px;margin-top:15px;">

<input
id="userInput"
type="text"
placeholder="Paste your Gemini API Key"
style="flex:1;padding:12px;border:1px solid #ccc;border-radius:10px;">

<button onclick="sendMessage()">
Send
</button>

</div>

<button class="backBtn" onclick="goBack()">
Back
</button>
.aiMessage{
background:#f3f4f6;
padding:12px;
border-radius:12px;
margin-bottom:10px;
max-width:80%;
font-size:15px;
line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<header>
🗣 English Coach AI
</header>

<div class="main">

<label>Gemini API Key</label>

<input
type="text"
placeholder="Paste your API Key">

<label>Scenario</label>

<textarea
  id="scenario"
placeholder="Example: Job Interview"></textarea>

<button onclick="startSession()">
Start Practice
</button>

</div>

</div>
<div id="chatScreen">

<div class="chatHeader">
English Coach Chat
</div>

<div id="chatBox">

<div class="aiMessage">

👋 Hello! I'm your English Coach.

</div>

</div>

<button class="backBtn" onclick="goBack()">
Back
</button>

</div>
  <script>

function startSession(){

document.querySelector(".container").style.display="none";

document.getElementById("chatScreen").style.display="block";

}

function goBack(){

document.querySelector(".container").style.display="block";

document.getElementById("chatScreen").style.display="none";

}
    function sendMessage(){

let input=document.getElementById("userInput");

let text=input.value.trim();

if(text=="") return;

let chat=document.getElementById("chatBox");

chat.innerHTML+=`
<div style="
background:#4f46e5;
color:white;
padding:12px;
border-radius:12px;
margin:10px 0;
margin-left:60px;
text-align:right;">
${text}
</div>
`;

chat.innerHTML+=`
<div style="
background:#f3f4f6;
padding:12px;
border-radius:12px;
margin-bottom:10px;
margin-right:60px;">
😊 Great! Keep practicing your English.
</div>
`;

input.value="";

chat.scrollTop=chat.scrollHeight;

    }
</script>
</body>
</html>
