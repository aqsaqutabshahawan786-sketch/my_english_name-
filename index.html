<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Coach App</title>
    <!-- Tailwind CSS CDN for Mobile Preview -->
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Smooth scrolling and native iOS momentum scrolling */
        .chat-scroll {
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased select-none text-slate-800">

    <!-- =================================================== -->
    <!-- DAY 1: DASHBOARD UI LAYOUT                          -->
    <!-- =================================================== -->
    <div id="dashboard-screen" class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-lg overflow-hidden">
        <!-- Top Bar Clean Branding -->
        <header class="bg-indigo-600 text-white p-4 shadow-md text-center font-bold text-xl tracking-wide">
            🗣️ English Coach
        </header>

        <main class="flex-1 p-5 space-y-6 overflow-y-auto">
            <!-- Custom Scenario Input Block -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-600">Apna Coaching Scenario Likhein:</label>
                <textarea id="scenario-input" rows="3" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none shadow-sm placeholder:text-slate-400" placeholder="Example: Job interview practice for a software engineer role..."></textarea>
            </div>

            <!-- Time Pricing Grid Layout -->
            <div class="space-y-3">
                <label class="block text-sm font-semibold text-slate-600">Session ki Duration Select Karein:</label>
                <div class="grid grid-cols-2 gap-3">
                    <!-- 15 Mins -->
                    <button onclick="startSession(15, 5)" class="flex flex-col items-center justify-center p-4 border border-indigo-100 bg-indigo-50/50 rounded-2xl active:scale-95 transition-all text-center group hover:border-indigo-500">
                        <span class="text-xs font-bold text-indigo-600 uppercase tracking-wider">Express</span>
                        <span class="text-2xl font-black text-slate-800 my-1">15 min</span>
                        <span class="text-sm font-semibold text-slate-500 bg-white px-3 py-0.5 rounded-full shadow-xs">$5</span>
                    </button>
                    <!-- 30 Mins -->
                    <button onclick="startSession(30, 10)" class="flex flex-col items-center justify-center p-4 border border-emerald-100 bg-emerald-50/50 rounded-2xl active:scale-95 transition-all text-center group hover:border-emerald-500">
                        <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider">Power</span>
                        <span class="text-2xl font-black text-slate-800 my-1">30 min</span>
                        <span class="text-sm font-semibold text-slate-500 bg-white px-3 py-0.5 rounded-full shadow-xs">$10</span>
                    </button>
                    <!-- 45 Mins -->
                    <button onclick="startSession(45, 15)" class="flex flex-col items-center justify-center p-4 border border-amber-100 bg-amber-50/50 rounded-2xl active:scale-95 transition-all text-center group hover:border-amber-500">
                        <span class="text-xs font-bold text-amber-600 uppercase tracking-wider">Deep Dive</span>
                        <span class="text-2xl font-black text-slate-800 my-1">45 min</span>
                        <span class="text-sm font-semibold text-slate-500 bg-white px-3 py-0.5 rounded-full shadow-xs">$15</span>
                    </button>
                    <!-- 1 Hour -->
                    <button onclick="startSession(60, 20)" class="flex flex-col items-center justify-center p-4 border border-rose-100 bg-rose-50/50 rounded-2xl active:scale-95 transition-all text-center group hover:border-rose-500">
                        <span class="text-xs font-bold text-rose-600 uppercase tracking-wider">Mastery</span>
                        <span class="text-2xl font-black text-slate-800 my-1">1 hour</span>
                        <span class="text-sm font-semibold text-slate-500 bg-white px-3 py-0.5 rounded-full shadow-xs">$20</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- =================================================== -->
    <!-- DAY 2 & 3: COACHING SESSION SCREEN & CHAT ENGINE    -->
    <!-- =================================================== -->
    <div id="coaching-screen" class="hidden min-h-screen flex flex-col max-w-md mx-auto bg-slate-100 overflow-hidden relative">
        <!-- Day 2 Top Navigation & Reverse Timer Header -->
        <header class="bg-white px-4 py-3 flex items-center justify-between shadow-xs border-b border-slate-200 sticky top-0 z-10">
            <button onclick="exitSession()" class="text-sm font-medium text-slate-500 active:text-rose-500">❌ Leave</button>
            <div id="timer-display" class="font-mono text-xl font-black text-indigo-600 tracking-wider bg-indigo-50 px-4 py-1 rounded-full border border-indigo-100 animate-pulse">
                00:00
            </div>
            <button id="pause-btn" onclick="toggleTimer()" class="bg-indigo-600 text-white font-bold text-xs px-4 py-1.5 rounded-lg shadow-sm active:bg-indigo-700">
                ⏸️ Pause
            </button>
        </header>

        <!-- Day 3 WhatsApp Style Bubble Chat Engine Area -->
        <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4 chat-scroll">
            <!-- Initial System Welcome Note -->
            <div class="text-center">
                <span id="system-scenario-tag" class="inline-block bg-slate-200 text-slate-600 text-xs px-3 py-1 rounded-md max-w-[85%] truncate"></span>
            </div>
        </div>

        <!-- Day 2 Pause Block Warning Layer Over Chat Screen -->
        <div id="pause-overlay" class="hidden absolute inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-20 transition-all">
            <div class="bg-white p-6 rounded-2xl shadow-xl text-center max-w-[80%] space-y-3">
                <p class="text-lg font-bold text-slate-800">Session Paused Hai ⏸️</p>
                <p class="text-xs text-slate-500">Chanting aur inputs tab tak locked hain jab tak aap resume nahi karte.</p>
                <button onclick="toggleTimer()" class="w-full bg-indigo-600 text-white py-2 rounded-xl text-sm font-bold shadow-md active:bg-indigo-700">▶️ Resume Session</button>
            </div>
        </div>

        <!-- Input Control Panel Footer Area (With State Lock Logic) -->
        <footer class="bg-white p-3 border-t border-slate-200 sticky bottom-0 z-10 flex items-center gap-2">
            <!-- Web Audio Native Mic Control -->
            <button id="mic-btn" onclick="startSpeechRecognition()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 p-3 rounded-xl transition-all active:scale-90 disabled:opacity-40 disabled:pointer-events-none" title="Speak">
                🎙️
            </button>
            <!-- Text input engine input -->
            <input type="text" id="chat-input" class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-50 disabled:opacity-50" placeholder="Type here in English...">
            <!-- Send UI Trigger -->
            <button id="send-btn" onclick="handleTextSubmit()" class="bg-indigo-600 text-white p-2.5 rounded-xl font-bold text-sm active:scale-95 disabled:opacity-40 disabled:pointer-events-none shadow-sm">
                ➔
            </button>
        </footer>
    </div>

    <!-- =================================================== -->
    <!-- DAY 2, 3, & 4: APP BACKEND LOGIC CORE MOTOR         -->
    <!-- =================================================== -->
    <script>
        // Core System State Management Parameters
        let countdownTimer = null;
        let totalSecondsRemaining = 0;
        let isTimerPaused = false;

        // --- DAY 2: NAVIGATION & SCREEN MANAGER ---
        function startSession(minutes, cost) {
            const scenarioText = document.getElementById('scenario-input').value.trim();
            document.getElementById('system-scenario-tag').innerText = scenarioText ? `Scenario: ${scenarioText}` : "Scenario: General Practice";
            
            // Screen switching logic
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('coaching-screen').classList.remove('hidden');
            
            // Setting up countdown clock metrics
            totalSecondsRemaining = minutes * 60;
            isTimerPaused = false;
            updateTimerDisplay();
            
            // Start interval engine
            clearInterval(countdownTimer);
            countdownTimer = setInterval(processTimerTick, 1000);
            
            // Inject first AI system greetings
            triggerAiResponseSimulation("Hello! I am your AI English Coach. Let's practice English based on your scenario. What would you like to talk about first?");
        }

        function exitSession() {
            if(confirm("Kya aap waqai is session ko khatam karna chahte hain?")) {
                clearInterval(countdownTimer);
                document.getElementById('coaching-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('chat-window').innerHTML = ''; // Clear chat area
