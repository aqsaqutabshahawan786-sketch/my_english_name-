<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Coach AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef2ff;
}

.container{
max-width:450px;
margin:auto;
min-height:100vh;
background:#fff;
display:flex;
flex-direction:column;
}

header{
background:#4f46e5;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.main{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

label{
font-weight:bold;
font-size:14px;
}

input,
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

textarea{
height:100px;
resize:none;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}
</style>

</head>

<body>

<div class="container">

<header>
🗣 English Coach AI
</header>

<div class="main">

<label>Gemini API Key</label>

<input
type="text"
placeholder="Paste your API Key">

<label>Scenario</label>

<textarea
placeholder="Example: Job Interview"></textarea>

<button>

Start Practice

</button>

</div>

</div>

</body>
</html>
